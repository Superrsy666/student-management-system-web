{% extends "base.html" %}

{% block content %}
<section class="form-page">
    <div class="page-head">
        <div>
            <h1>{{ title }}</h1>
            <p>填写学生基础信息，电话、邮箱、高考分数和生源地可选。</p>
        </div>
        <a class="button secondary" href="{{ url_for('students') }}">返回列表</a>
    </div>

    <form method="post" class="form grid-form">
        <label>
            学号
            <input type="text" name="student_no" value="{{ student.student_no or '' }}" required>
        </label>
        <label>
            姓名
            <input type="text" name="name" value="{{ student.name or '' }}" required>
        </label>
        <label>
            年级
            <input type="text" name="grade" value="{{ student.grade or '' }}" required>
        </label>
        <label>
            班级
            <input type="text" name="class_name" value="{{ student.class_name or '' }}" required>
        </label>
        <label>
            性别
            <select name="gender" required>
                <option value="">请选择</option>
                <option value="男" {% if student.gender == "男" %}selected{% endif %}>男</option>
                <option value="女" {% if student.gender == "女" %}selected{% endif %}>女</option>
            </select>
        </label>
        <label>
            专业
            <input type="text" name="major" value="{{ student.major or '' }}" required>
        </label>
        <label>
            电话
            <input type="text" name="phone" value="{{ student.phone or '' }}">
        </label>
        <label>
            邮箱
            <input type="email" name="email" value="{{ student.email or '' }}">
        </label>
        <label>
            高考分数
            <input type="number" name="exam_score" min="0" max="750" value="{{ student.exam_score if student.exam_score is not none else '' }}">
        </label>
        <label>
            生源地
            <select name="province">
                <option value="">请选择</option>
                {% for province in provinces %}
                    <option value="{{ province }}" {% if student.province == province %}selected{% endif %}>{{ province }}</option>
                {% endfor %}
            </select>
        </label>
        <div class="form-actions">
            <button type="submit">保存</button>
            <a class="button secondary" href="{{ url_for('students') }}">取消</a>
        </div>
    </form>
</section>
{% endblock %}
